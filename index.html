<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LessonOS - Lesson Management for Training Businesses</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fafbfc;
        }

        /* Language toggle */
        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 24px;
            z-index: 10;
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 3px;
        }
        .lang-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: rgba(255,255,255,0.25);
            color: white;
        }
        .lang-btn:hover {
            color: white;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white;
            text-align: center;
            padding: 80px 20px 60px;
            position: relative;
        }
        .hero-logo {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .hero-logo img {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
        }
        .hero-logo span {
            color: #8ec5fc;
        }
        .hero-tagline {
            font-size: 1.3rem;
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 24px;
        }
        .hero-desc {
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.05rem;
            opacity: 0.85;
            line-height: 1.7;
        }

        /* Features */
        .features-section {
            max-width: 960px;
            margin: -30px auto 0;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .feature {
            background: white;
            padding: 28px 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .feature:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
        }
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            display: block;
        }
        .feature h3 {
            color: #1a73e8;
            font-size: 1.05rem;
            margin-bottom: 8px;
        }
        .feature p {
            color: #5f6368;
            font-size: 0.92rem;
            line-height: 1.5;
        }
        .coming-soon {
            display: inline-block;
            background: #fef7e0;
            color: #b06d00;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
            letter-spacing: 0.3px;
        }

        /* Who section */
        .who-section {
            max-width: 960px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }
        .who-section h2 {
            color: #1a73e8;
            font-size: 1.6rem;
            margin-bottom: 16px;
        }
        .who-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        .who-tag {
            background: #e8f0fe;
            color: #1a73e8;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Pricing */
        .pricing-section {
            max-width: 1000px;
            margin: 20px auto 40px;
            padding: 0 20px;
        }
        .pricing-section h2 {
            color: #1a73e8;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 8px;
        }
        .pricing-sub {
            text-align: center;
            color: #5f6368;
            margin-bottom: 32px;
            font-size: 1rem;
        }
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .pricing-card {
            background: white;
            border-radius: 16px;
            padding: 32px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .pricing-card.featured {
            border: 2px solid #1a73e8;
            transform: scale(1.03);
        }
        .pricing-badge {
            position: absolute;
            top: -12px;
            right: 20px;
            background: #1a73e8;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .pricing-tier {
            color: #1a73e8;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .pricing-price {
            font-size: 2.2rem;
            font-weight: 800;
            color: #202124;
            margin-bottom: 4px;
        }
        .pricing-price small {
            font-size: 0.95rem;
            font-weight: 500;
            color: #5f6368;
        }
        .pricing-note {
            color: #5f6368;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .pricing-features {
            list-style: none;
            padding: 0;
            margin: 0 0 24px;
            flex-grow: 1;
        }
        .pricing-features li {
            padding: 8px 0;
            color: #3c4043;
            font-size: 0.92rem;
            border-bottom: 1px solid #f1f3f4;
            display: flex;
            align-items: start;
            gap: 8px;
        }
        .pricing-features li:last-child {
            border-bottom: none;
        }
        .pricing-features li::before {
            content: "✓";
            color: #1a73e8;
            font-weight: 700;
            flex-shrink: 0;
        }
        .pricing-features li.disabled {
            color: #9aa0a6;
        }
        .pricing-features li.disabled::before {
            content: "—";
            color: #9aa0a6;
        }
        .pricing-note-box {
            max-width: 800px;
            margin: 32px auto 0;
            padding: 20px;
            background: #e8f0fe;
            border-radius: 12px;
            text-align: center;
            color: #1a73e8;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        @media (max-width: 720px) {
            .pricing-grid { grid-template-columns: 1fr; }
            .pricing-card.featured { transform: none; }
        }

        /* CTA */
        .cta-section {
            text-align: center;
            padding: 50px 20px 60px;
            background: white;
            margin-top: 40px;
        }
        .cta-section h2 {
            color: #202124;
            font-size: 1.6rem;
            margin-bottom: 12px;
        }
        .cta-section p {
            color: #5f6368;
            margin-bottom: 24px;
        }
        .cta-badges {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .cta-badge {
            display: inline-block;
            background: #1a73e8;
            color: white;
            padding: 14px 36px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: background 0.2s;
        }
        .cta-badge:hover {
            background: #1557b0;
        }
        .cta-badge.apple {
            background: #000;
        }
        .cta-badge.apple:hover {
            background: #333;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid #e8eaed;
            background: #fafbfc;
        }
        .footer a {
            color: #1a73e8;
            text-decoration: none;
            margin: 0 16px;
            font-size: 0.9rem;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .footer .copyright {
            color: #9aa0a6;
            font-size: 0.82rem;
            margin-top: 12px;
        }

        @media (max-width: 720px) {
            .features { grid-template-columns: 1fr 1fr; }
            .hero { padding: 60px 20px 50px; }
            .hero-logo { font-size: 2.5rem; }
        }
        @media (max-width: 480px) {
            .features { grid-template-columns: 1fr; }
            .hero-tagline { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="hero">

            <div class="feature">

            <div class="feature">

                <h3 data-en="7 Languages" data-zh="7种语言"></h3>
                <p data-en="English, Chinese, Japanese, Spanish, Malay, Indonesian, and French." data-zh="英语、中文、日语、西班牙语、马来语、印尼语、法语。"></p>

    </div>

                <div class="pricing-note" data-en="Everything in Pro, plus:" data-zh="包含专业版所有功能，另加："></div>

    <div class="who-section">

        <div class="who-tags">
            <span class="who-tag" data-en="Music Schools" data-zh="音乐学校"></span>
            <span class="who-tag" data-en="Martial Arts Studios" data-zh="武术馆"></span>

    <script>
        function setLang(lang) {
            document.querySelectorAll('[data-en]').forEach(function(el) {
                el.textContent = el.getAttribute('data-' + lang);
            });
            document.querySelectorAll('.lang-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.trim() === (lang === 'en' ? 'EN' : '中文'));
            });
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            localStorage.setItem('lang', lang);
        }
        // Auto-detect: saved preference > browser language > default EN
        var saved = localStorage.getItem('lang');
        var lang = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
        setLang(lang);
    </script>
</body>
</html>
