<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LessonOS - Lesson Management for Training Businesses</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fafbfc;
        }

        /* Language toggle */
        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 24px;
            z-index: 10;
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 3px;
        }
        .lang-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: rgba(255,255,255,0.25);
            color: white;
        }
        .lang-btn:hover {
            color: white;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white;
            text-align: center;
            padding: 80px 20px 60px;
            position: relative;
        }
        .hero-logo {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .hero-logo img {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
        }
        .hero-logo span {
            color: #8ec5fc;
        }
        .hero-tagline {
            font-size: 1.3rem;
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 24px;
        }
        .hero-desc {
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.05rem;
            opacity: 0.85;
            line-height: 1.7;
        }

        /* Features */
        .features-section {
            max-width: 960px;
            margin: -30px auto 0;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .feature {
            background: white;
            padding: 28px 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .feature:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
        }
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            display: block;
        }
        .feature h3 {
            color: #1a73e8;
            font-size: 1.05rem;
            margin-bottom: 8px;
        }
        .feature p {
            color: #5f6368;
            font-size: 0.92rem;
            line-height: 1.5;
        }

        /* Who section */
        .who-section {
            max-width: 960px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }
        .who-section h2 {
            color: #1a73e8;
            font-size: 1.6rem;
            margin-bottom: 16px;
        }
        .who-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        .who-tag {
            background: #e8f0fe;
            color: #1a73e8;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* CTA */
        .cta-section {
            text-align: center;
            padding: 50px 20px 60px;
            background: white;
            margin-top: 40px;
        }
        .cta-section h2 {
            color: #202124;
            font-size: 1.6rem;
            margin-bottom: 12px;
        }
        .cta-section p {
            color: #5f6368;
            margin-bottom: 24px;
        }
        .cta-badge {
            display: inline-block;
            background: #1a73e8;
            color: white;
            padding: 14px 36px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: background 0.2s;
        }
        .cta-badge:hover {
            background: #1557b0;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid #e8eaed;
            background: #fafbfc;
        }
        .footer a {
            color: #1a73e8;
            text-decoration: none;
            margin: 0 16px;
            font-size: 0.9rem;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .footer .copyright {
            color: #9aa0a6;
            font-size: 0.82rem;
            margin-top: 12px;
        }

        @media (max-width: 720px) {
            .features { grid-template-columns: 1fr 1fr; }
            .hero { padding: 60px 20px 50px; }
            .hero-logo { font-size: 2.5rem; }
        }
        @media (max-width: 480px) {
            .features { grid-template-columns: 1fr; }
            .hero-tagline { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="lang-toggle">
            <button class="lang-btn active" onclick="setLang('en')">EN</button>
            <button class="lang-btn" onclick="setLang('zh')">中文</button>
        </div>
        <div class="hero-logo">
            <img src="logo.png" alt="LessonOS logo">
            Lesson<span>OS</span>
        </div>
        <p class="hero-tagline" data-en="Simple lesson management for training businesses" data-zh="简单易用的培训机构管理工具"></p>
        <p class="hero-desc" data-en="Manage students, classes, attendance, and leave requests — all from your phone. No servers, no accounts, no complexity." data-zh="管理学员、课程、考勤和请假 — 全部在手机上完成。无需服务器，无需注册，简单高效。"></p>
    </div>

    <div class="features-section">
        <div class="features">
            <div class="feature">
                <span class="feature-icon">&#x1F393;</span>
                <h3 data-en="Student Management" data-zh="学员管理"></h3>
                <p data-en="Track students, contact info, credit balances, and enrollment status." data-zh="管理学员信息、联系方式、课时余额和报名状态。"></p>
            </div>
            <div class="feature">
                <span class="feature-icon">&#x1F4C5;</span>
                <h3 data-en="Class Scheduling" data-zh="课程排班"></h3>
                <p data-en="Set up recurring weekly classes with day-of-week and time scheduling." data-zh="设置每周循环课程，支持按星期和时间灵活排班。"></p>
            </div>
            <div class="feature">
                <span class="feature-icon">&#x2714;&#xFE0F;</span>
                <h3 data-en="Quick Check-In" data-zh="快速签到"></h3>
                <p data-en="One-tap attendance check-in with automatic credit deduction." data-zh="一键签到考勤，自动扣减课时。"></p>
            </div>
            <div class="feature">
                <span class="feature-icon">&#x1F4CB;</span>
                <h3 data-en="Leave Management" data-zh="请假管理"></h3>
                <p data-en="Handle leave requests with approval workflows." data-zh="处理请假申请，支持审批流程。"></p>
            </div>
            <div class="feature">
                <span class="feature-icon">&#x2601;&#xFE0F;</span>
                <h3 data-en="Google Drive Backup" data-zh="Google Drive 备份"></h3>
                <p data-en="Back up your data to your personal Google Drive for safekeeping." data-zh="将数据备份到您的 Google Drive，安全可靠。"></p>
            </div>
            <div class="feature">
                <span class="feature-icon">&#x1F4CA;</span>
                <h3 data-en="CSV Export" data-zh="CSV 导出"></h3>
                <p data-en="Export student lists, attendance, and rosters to spreadsheets." data-zh="导出学员名单、考勤记录和花名册到电子表格。"></p>
            </div>
        </div>
    </div>

    <div class="who-section">
        <h2 data-en="Built for" data-zh="适用于"></h2>
        <div class="who-tags">
            <span class="who-tag" data-en="Music Schools" data-zh="音乐学校"></span>
            <span class="who-tag" data-en="Martial Arts Studios" data-zh="武术馆"></span>
            <span class="who-tag" data-en="Tutoring Centers" data-zh="辅导机构"></span>
            <span class="who-tag" data-en="Dance Academies" data-zh="舞蹈学院"></span>
            <span class="who-tag" data-en="Language Schools" data-zh="语言学校"></span>
            <span class="who-tag" data-en="Swim Schools" data-zh="游泳学校"></span>
        </div>
    </div>

    <div class="cta-section">
        <h2 data-en="Get Started" data-zh="立即开始"></h2>
        <p data-en="Available now on Google Play for Android devices." data-zh="现已在 Google Play 上架，支持 Android 设备。"></p>
        <a class="cta-badge" href="https://play.google.com/store/apps/details?id=com.cjtoolseram.lessonos" target="_blank" data-en="Download on Google Play" data-zh="在 Google Play 下载"></a>
    </div>

    <div class="footer">
        <a href="https://lessonos.app/privacy.html" data-en="Privacy Policy" data-zh="隐私政策"></a>
        <a href="mailto:cjtoolseram@gmail.com" data-en="Contact Support" data-zh="联系支持"></a>
        <div class="copyright">&copy; 2026 LessonOS. All rights reserved.</div>
    </div>

    <script>
        function setLang(lang) {
            document.querySelectorAll('[data-en]').forEach(function(el) {
                el.textContent = el.getAttribute('data-' + lang);
            });
            document.querySelectorAll('.lang-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.trim() === (lang === 'en' ? 'EN' : '中文'));
            });
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            localStorage.setItem('lang', lang);
        }
        // Auto-detect: saved preference > browser language > default EN
        var saved = localStorage.getItem('lang');
        var lang = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
        setLang(lang);
    </script>
</body>
</html>
